# ScienceKG Phase 1 Configuration
# Harvester, Storage, and Deduplication Setup

harvester:
  # ArXiv API
  arxiv:
    base_url: "https://export.arxiv.org/api/query"
    requests_per_second: 0.333  # 3 second pause between requests (arXiv recommendation)
    timeout_seconds: 30
    max_papers_per_search: 100

  # Semantic Scholar API
  semantic_scholar:
    api_key: null  # Set via environment variable or config
    base_url_graph: "https://api.semanticscholar.org/graph/v1"
    base_url_recommendations: "https://api.semanticscholar.org/recommendations/v1"
    requests_per_second: 10.0
    timeout_seconds: 30
    bubble_extension: true  # Enable automatic recommended papers discovery
    bubble_extension_count: 30  # How many recommended papers to fetch

  # OpenAlex API
  openalex:
    api_key: null  # Free tier; set for higher limits
    base_url: "https://api.openalex.org"
    requests_per_second: 10.0
    timeout_seconds: 30

  # Unpaywall API
  unpaywall:
    email: "your-email@example.com"  # Required for Unpaywall API
    base_url: "https://api.unpaywall.org/v2"
    timeout_seconds: 30

  # Papers with Code
  papers_with_code:
    # This API may have limited availability; kept for reference
    timeout_seconds: 30
    token: null

storage:
  # PDF Storage
  pdf_base_dir: "data/pdfs"
  
  # Metadata Database
  duckdb_path: "data/metadata.duckdb"
  vocabulary_path: "data/vocabulary.json"

deduplication:
  # Deduplication strategy
  by_doi: true  # Exact DOI match
  by_normalized_title: true  # Normalized title matching
  keep_highest_version: true  # When duplicates exist, keep the one with highest version

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/sciencekg.log"

# Rate Limiting & Throttling
rate_limits:
  # Global concurrency limit for API requests
  max_concurrent_requests: 5
  # Respect API rate limits per service
  respect_rate_limits: true

# ScienceKG Phase 3 Configuration
# LLM Configuration for Entity Extraction and Analysis

llm:
  # Default provider for all LLM operations
  default_provider: "ollama"

  # Supported providers: ollama, lm_studio, openai, openai_compatible
  providers:
    # Ollama - Local open-source models
    ollama:
      provider_type: "ollama"
      base_url: "http://localhost:11434"
      api_key: null  # Ollama doesn't require API key
      timeout_seconds: 300
      models:
        - "qwen3.6:35b"
        - "llama3.1:8b"
        - "mistral-small:latest"
      
      # Model and Generation Settings
      model: "qwen3.6:35b"
      temperature: 0.2          # Lower = more deterministic
      top_p: 0.95               # Nucleus sampling
      max_tokens: 2048          # Max output tokens
      context_size: 32768       # Max input context
      repeat_penalty: 1.05      # Penalize repeated tokens
      seed: null                # null = random, or specify for reproducibility

    # LM Studio - Alternative local inference
    lm_studio:
      provider_type: "openai_compatible"
      base_url: "http://localhost:1234/v1"
      api_key: null  # LM Studio doesn't require API key
      timeout_seconds: 300
      models:
        - "qwen3.6-35b"
        - "llama-3.1-8b-instruct"
        - "mistral-small-3.1"
      
      model: "qwen3.6-35b"      # Model name in LM Studio
      temperature: 0.2
      top_p: 0.95
      max_tokens: 2048
      context_size: 32768
      repeat_penalty: 1.05
      seed: null

    # OpenAI API - Cloud-based GPT models
    openai:
      provider_type: "openai_compatible"
      base_url: "https://api.openai.com/v1"
      api_key_env: "OPENAI_API_KEY"  # Load from environment variable
      timeout_seconds: 60
      models:
        - "gpt-4.1-mini"
        - "gpt-4.1"
        - "gpt-4o"
      
      model: "gpt-4o"
      temperature: 0.3
      top_p: 0.95
      max_tokens: 4096
      context_size: 128000
      repeat_penalty: null  # OpenAI doesn't support repeat_penalty

    # Generic OpenAI-compatible API (e.g., Ollama exposed via proxy, DeepSeek, etc.)
    custom_api:
      provider_type: "openai_compatible"
      base_url: "https://custom-api.example.com/v1"
      api_key_env: "CUSTOM_API_KEY"
      timeout_seconds: 120
      models:
        - "custom-model"
      
      model: "custom-model"
      temperature: 0.2
      top_p: 0.95
      max_tokens: 2048
      context_size: 16384
      repeat_penalty: 1.05

  # Entity Extraction
  entity_extraction:
    # Use detailed prompts for better concept extraction
    detailed_prompts: true
    # Link concepts to OpenAlex by default
    link_to_knowledge_base: true
    # Generate embeddings for extracted concepts
    embed_concepts: true

  # Conflict Detection
  conflict_detection:
    enabled: true
    confidence_threshold: 0.7  # Only report conflicts with >= 0.7 confidence

  # Batch Processing
  batch_processing:
    # Process papers in batches to optimize API calls
    batch_size: 10
    # Number of parallel jobs (for Celery integration)
    parallel_jobs: 4
    # Retry failed extractions
    max_retries: 2
    retry_delay_seconds: 10
